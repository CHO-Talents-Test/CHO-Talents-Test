<!DOCTYPE html>
<html lang="ko" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>달란트 상점 - 달란트 마을</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
  <link rel="stylesheet" href="css/themes.css?v=3.59.0" />
  <link rel="stylesheet" href="css/common.css?v=3.59.0" />
  <style>
    .product-card { cursor: pointer; }
    .product-card img.product-img { cursor: zoom-in; }
    .product-card .product-buy-btn { cursor: pointer; }
    .product-detail-overlay, .image-zoom-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000;
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .product-detail-overlay.hidden, .image-zoom-overlay.hidden { display: none; }
    .product-detail-modal, .image-zoom-modal {
      background: var(--t-card, #fff); color: var(--t-text, #212529); border: 1px solid var(--t-border, #e9ecef);
      border-radius: 10px; box-shadow: 0 18px 50px rgba(0,0,0,0.22); max-height: 90vh; overflow: hidden;
    }
    .product-detail-modal { width: min(760px, 96vw); display: flex; flex-direction: column; }
    .product-detail-head, .image-zoom-head {
      padding: 1rem 1.1rem; border-bottom: 1px solid var(--t-border, #e9ecef);
      display: flex; justify-content: space-between; align-items: flex-start; gap: 0.8rem;
    }
    .product-detail-head h3, .image-zoom-head h3 { margin: 0; font-size: 1.05rem; line-height: 1.35; }
    .product-detail-close, .image-zoom-close {
      border: 1px solid var(--t-border, #dee2e6); background: var(--t-bg, #f8f9fa); color: var(--t-text, #222);
      width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; flex: 0 0 auto;
    }
    .product-detail-body { padding: 1rem 1.1rem 1.1rem; overflow-y: auto; }
    .product-detail-layout { display: grid; grid-template-columns: minmax(240px, 1fr) minmax(0, 1.2fr); gap: 1rem; align-items: start; }
    .product-detail-media img {
      width: 100%; max-height: 360px; object-fit: contain; display: block; border: 1px solid var(--t-border, #e9ecef);
      border-radius: 10px; background: var(--t-bg, #f8f9fa); cursor: zoom-in;
    }
    .product-detail-emoji {
      width: 100%; min-height: 220px; border: 1px solid var(--t-border, #e9ecef); border-radius: 10px;
      background: var(--t-bg, #f8f9fa); display: flex; align-items: center; justify-content: center; font-size: 4rem;
    }
    .product-detail-meta { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-bottom: 0.8rem; font-size: 0.78rem; color: var(--t-text-muted, #868e96); }
    .product-detail-price { font-size: 1.25rem; font-weight: 800; margin: 0.25rem 0 0.8rem; }
    .product-detail-desc { line-height: 1.65; white-space: pre-wrap; }
    .product-detail-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; justify-content: flex-end; }
    .image-zoom-modal { width: min(92vw, 1000px); max-height: 92vh; display: flex; flex-direction: column; }
    .image-zoom-body { padding: 1rem 1.1rem 1.1rem; overflow: auto; }
    .image-zoom-body img { display: block; max-width: 100%; max-height: 74vh; margin: 0 auto; object-fit: contain; }
    @media (max-width: 720px) {
      .product-detail-layout { grid-template-columns: 1fr; }
      .product-detail-emoji { min-height: 180px; }
    }
  </style>
</head>
<body class="page-body">
  <div id="nav-container"></div>


  <div class="page-container">
    <h1 class="page-title">🛒 달란트 상점</h1>
    <p class="page-sub" id="shopSub">달란트로 교환할 수 있는 상품들이에요!</p>

    <div id="tabArea" style="display:none;margin-bottom:1.5rem;gap:0.5rem;">
      <button class="filter-btn" id="tabStudent" onclick="switchShopTab('student')">🎒 학생용</button>
      <button class="filter-btn" id="tabTeacher" onclick="switchShopTab('teacher')">👩‍🏫 교사용</button>
      <button class="filter-btn" id="btnProxyBuy" data-min-perm="40" style="display:none;background:#e67700;color:#fff;" onclick="openProxyModal()">🤝 대리 구매</button>
    </div>
    <div id="shopFilterArea" style="display:none;margin-bottom:1rem;gap:0.5rem;flex-wrap:wrap;align-items:center;">
      <select id="shopCatFilter" onchange="renderShopProducts()" style="padding:0.4rem 0.8rem;border:1px solid #ddd;border-radius:8px;font-size:0.84rem;">
        <option value="">전체 카테고리</option>
      </select>
      <input type="text" id="shopSearchInput" oninput="renderShopProducts()" placeholder="상품명/카테고리 검색..." style="padding:0.4rem 0.8rem;border:1px solid #ddd;border-radius:8px;font-size:0.84rem;flex:1;min-width:140px;" />
    </div>

    <!-- 대리 구매 모달 -->
    <div id="proxyModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:var(--t-card, #fff);border-radius:12px;padding:1.5rem;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2);color:var(--t-text, #212529);">
        <h3 style="margin:0 0 1rem;">🤝 대리 구매</h3>
        <div style="margin-bottom:0.8rem;">
          <label style="font-weight:600;font-size:0.85rem;display:block;margin-bottom:0.3rem;">대상 사용자 검색</label>
          <input type="text" id="proxySearch" placeholder="이름 또는 아이디 검색..." style="width:100%;padding:0.6rem;border:1px solid var(--t-border, #ddd);border-radius:8px;font-size:0.88rem;background:var(--t-input-bg, #fff);color:var(--t-text, #212529);" oninput="onProxySearch()" autocomplete="off" />
          <div id="proxyResults" style="display:none;max-height:180px;overflow-y:auto;border:1px solid var(--t-border, #ddd);border-top:none;border-radius:0 0 8px 8px;background:var(--t-card, #fff);"></div>
        </div>
        <div id="proxySelected" style="display:none;margin-bottom:0.8rem;padding:0.6rem;background:var(--t-accent-surface, #f3f0ff);border-radius:8px;font-size:0.88rem;color:var(--t-text, #212529);">
          <span id="proxySelectedInfo"></span>
          <button onclick="clearProxy()" style="float:right;background:none;border:none;cursor:pointer;color:#ff6b6b;font-weight:700;">✕</button>
        </div>
        <div id="proxyProductArea" style="display:none;">
          <label style="font-weight:600;font-size:0.85rem;display:block;margin-bottom:0.3rem;">구매할 상품</label>
          <select id="proxyProduct" style="width:100%;padding:0.6rem;border:1px solid var(--t-border, #ddd);border-radius:8px;font-size:0.88rem;background:var(--t-input-bg, #fff);color:var(--t-text, #212529);">
            <option value="">상품 선택</option>
          </select>
          <p id="proxyBalanceInfo" style="font-size:0.82rem;color:#868e96;margin-top:0.3rem;"></p>
        </div>
        <div style="display:flex;gap:0.5rem;margin-top:1rem;justify-content:flex-end;">
          <button onclick="closeProxyModal()" style="padding:0.5rem 1rem;border:1px solid var(--t-border, #ddd);border-radius:8px;background:var(--t-card, #fff);color:var(--t-text, #212529);cursor:pointer;">취소</button>
          <button id="btnProxyConfirm" onclick="confirmProxy()" style="padding:0.5rem 1rem;border:none;border-radius:8px;background:#228be6;color:#fff;font-weight:700;cursor:pointer;" disabled>구매 신청</button>
        </div>
      </div>
    </div>

  <div id="productArea">
      <div class="empty-state">
        <div class="empty-state-icon">⏳</div>
        <p>상품을 불러오는 중...</p>
      </div>
    </div>
  </div>

  <div class="product-detail-overlay hidden" id="productDetailOverlay">
    <div class="product-detail-modal" role="dialog" aria-modal="true" aria-labelledby="productDetailTitle">
      <div class="product-detail-head">
        <h3 id="productDetailTitle">상품 상세</h3>
        <button class="product-detail-close" type="button" onclick="closeProductDetail()">&times;</button>
      </div>
      <div class="product-detail-body">
        <div class="product-detail-layout">
          <div class="product-detail-media" id="productDetailMedia"></div>
          <div>
            <div class="product-detail-meta" id="productDetailMeta"></div>
            <div class="product-detail-price" id="productDetailPrice"></div>
            <div class="product-detail-desc" id="productDetailDesc"></div>
            <div class="product-detail-actions" id="productDetailActions"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="image-zoom-overlay hidden" id="imageZoomOverlay">
    <div class="image-zoom-modal" role="dialog" aria-modal="true" aria-labelledby="imageZoomTitle">
      <div class="image-zoom-head">
        <h3 id="imageZoomTitle">이미지 크게 보기</h3>
        <button class="image-zoom-close" type="button" onclick="closeImageZoom()">&times;</button>
      </div>
      <div class="image-zoom-body">
        <img id="imageZoomImg" alt="확대 이미지" />
      </div>
    </div>
  </div>

  <footer class="page-footer">
    <p>초등부 달란트 관리 &copy; 2026 CHO-Talents</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config/public-config.js?v=3.59.0"></script>
  <script src="js/supabase-config.js?v=3.59.0"></script>
  <script src="js/activity-log.js?v=3.59.0"></script>
  <script src="js/codes.js?v=3.59.0"></script>
  <script src="js/auth.js?v=3.59.0"></script>
  <script src="js/theme.js?v=3.59.0"></script>
  <script src="js/nav.js?v=3.59.0"></script>
  <script src="js/product.js?v=3.59.0"></script>
  <script src="js/user-mgmt.js?v=3.59.0"></script>
  <script src="js/slack-notify.js?v=3.59.0"></script>
  <script>
    initSupabase();
    let currentShopTab = 'student';
    let allShopProducts = [];
    let _canViewTeacher = false;
    let _shopSession = null;
    let _userBalance = 0;
    let _userPending = 0;
    let _selectedProduct = null;

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    (async () => {
      await navInit();
      const session = await loadAuthSession();
      _shopSession = session;
      if (session) navUpdateAuth(session);
      await initTheme();
      if (session) {
        _canViewTeacher = session.userType === 'teacher' || (session.permissionRank || 0) >= 60;
        currentShopTab = _canViewTeacher ? (session.userType || 'student') : 'student';
        if (_canViewTeacher) document.getElementById('tabArea').style.display = 'flex';
        if ((session.permissionRank || 0) >= 40) document.getElementById('btnProxyBuy').style.display = '';

        let prof = null;
        const { data: p1, error: e1 } = await _sb.from('profiles').select('talent_balance,pending_talent').eq('id', session.id).single();
        if (e1) {
          const { data: p2 } = await _sb.from('profiles').select('talent_balance').eq('id', session.id).single();
          prof = p2;
          if (prof) { _userBalance = prof.talent_balance || 0; _userPending = 0; }
          logWarn('SHOP_PROFILE_FALLBACK', { 오류: e1.message });
        } else {
          prof = p1;
          if (prof) { _userBalance = prof.talent_balance || 0; _userPending = prof.pending_talent || 0; }
        }
      }
      autoLogPageView();
      await loadAllProducts();
      switchShopTab(currentShopTab);
    })();

    async function loadAllProducts() {
      let query = _sb.from('products').select('*').eq('is_active', true);
      if (!_canViewTeacher) {
        query = query.eq('target_role', 'student');
      }
      const { data, error } = await query.order('created_at', { ascending: false });
      allShopProducts = data || [];
      renderShopProducts();
    }

    function switchShopTab(tab) {
      currentShopTab = tab;
      document.getElementById('tabStudent').classList.toggle('active', tab === 'student');
      document.getElementById('tabTeacher').classList.toggle('active', tab === 'teacher');
      updateCategoryFilter();
      renderShopProducts();
    }

    function updateCategoryFilter() {
      const filtered = allShopProducts.filter(p => p.target_role === currentShopTab);
      const cats = [...new Set(filtered.map(p => p.category || 'etc'))].sort((a, b) =>
        getProductCategoryLabel(a).localeCompare(getProductCategoryLabel(b), 'ko')
      );
      const sel = document.getElementById('shopCatFilter');
      sel.innerHTML = '<option value="">전체 카테고리</option>' + cats.map(c => `<option value="${c}">${getProductCategoryLabel(c)}</option>`).join('');
      document.getElementById('shopFilterArea').style.display = 'flex';
    }

    function renderShopProducts() {
      const catFilter = (document.getElementById('shopCatFilter') || {}).value || '';
      const searchText = ((document.getElementById('shopSearchInput') || {}).value || '').trim().toLowerCase();
      let filtered = allShopProducts.filter(p => p.target_role === currentShopTab);
      if (catFilter) filtered = filtered.filter(p => (p.category || 'etc') === catFilter);
      if (searchText) filtered = filtered.filter(p =>
        (p.name || '').toLowerCase().includes(searchText) ||
        (p.category || '').toLowerCase().includes(searchText) ||
        getProductCategoryLabel(p.category || 'etc').toLowerCase().includes(searchText)
      );
      const area = document.getElementById('productArea');
      const label = currentShopTab === 'student' ? '학생' : '교사';
      document.getElementById('shopSub').textContent = `${label} 달란트 교환 상품입니다`;

      if (filtered.length === 0) {
        area.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📦</div><p>등록된 상품이 없습니다.</p></div>';
        return;
      }

      const categories = {};
      filtered.forEach(p => { const cat = p.category || 'etc'; if (!categories[cat]) categories[cat] = []; categories[cat].push(p); });
      let html = '';
      for (const [cat, items] of Object.entries(categories)) {
        html += `<h2 class="section-title">${getProductCategoryLabel(cat)}</h2><div class="product-grid">`;
        html += items.map(p => renderProductCard(p)).join('');
        html += '</div>';
      }
      area.innerHTML = html;
    }

    function renderProductCard(p) {
      const available = _userBalance - _userPending;
      const isTeacherBuyingStudent = _shopSession && _shopSession.userType === 'teacher' && p.target_role === 'student';
      const canBuy = _shopSession && p.is_active && available >= p.price && !isTeacherBuyingStudent;
      const buyBtnHtml = _shopSession
        ? (isTeacherBuyingStudent
          ? ''
          : `<button class="product-buy-btn" onclick="event.stopPropagation(); requestOrder('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price})" ${!canBuy?'disabled':''} style="margin-top:0.5rem;width:100%;padding:0.5rem;border:none;border-radius:8px;background:${canBuy?'#228be6':'var(--t-border, #dee2e6)'};color:${canBuy?'#fff':'var(--t-text-muted, #868e96)'};font-weight:700;cursor:${canBuy?'pointer':'default'};">🛒 구매 신청</button>`)
        : '';
      return `<div class="product-card" onclick="openProductDetail('${p.id}')">
        ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}" class="product-img" onclick="event.stopPropagation(); openImageZoom('${escapeAttr(p.image_url)}','${escapeAttr(p.name)}')" />` : `<span class="product-emoji">${p.image_emoji || '🎁'}</span>`}
        <div class="product-name">${escapeHtml(p.name)}</div>
        <div class="product-price">${fmtNum(p.price)} <span class="unit">달란트</span></div>
        <div class="product-desc">${escapeHtml(p.description || '')}</div>
        
        ${buyBtnHtml}
      </div>`;
    }

    function openProductDetail(productId) {
      const product = allShopProducts.find(p => p.id === productId);
      if (!product) return;
      _selectedProduct = product;
      document.getElementById('productDetailTitle').textContent = product.name || '상품 상세';
      document.getElementById('productDetailMeta').innerHTML =
        `<span>카테고리: ${escapeHtml(getProductCategoryLabel(product.category || 'etc'))}</span>` +
        `<span>대상: ${escapeHtml(getProductTargetLabel(product.target_role || 'student'))}</span>`;
      document.getElementById('productDetailPrice').textContent = `${fmtNum(product.price)} 달란트`;
      document.getElementById('productDetailDesc').textContent = product.description || '설명이 없습니다.';
      const media = document.getElementById('productDetailMedia');
      if (product.image_url) {
        media.innerHTML = `<img src="${escapeAttr(product.image_url)}" alt="${escapeAttr(product.name)}" onclick="openImageZoom('${escapeAttr(product.image_url)}','${escapeAttr(product.name)}')" />`;
      } else {
        media.innerHTML = `<div class="product-detail-emoji">${escapeHtml(product.image_emoji || '🎁')}</div>`;
      }
      const available = _userBalance - _userPending;
      const isTeacherBuyingStudent = _shopSession && _shopSession.userType === 'teacher' && product.target_role === 'student';
      const canBuy = _shopSession && product.is_active && available >= product.price && !isTeacherBuyingStudent;
      document.getElementById('productDetailActions').innerHTML = _shopSession && !isTeacherBuyingStudent
        ? `<button class="product-buy-btn" type="button" onclick="requestOrder('${product.id}','${product.name.replace(/'/g,"\\'")}',${product.price}); closeProductDetail();" ${!canBuy ? 'disabled' : ''} style="padding:0.55rem 1rem;border:none;border-radius:8px;background:${canBuy?'#228be6':'var(--t-border, #dee2e6)'};color:${canBuy?'#fff':'var(--t-text-muted, #868e96)'};font-weight:700;cursor:${canBuy?'pointer':'default'};">🛒 구매 신청</button>`
        : '';
      document.getElementById('productDetailOverlay').classList.remove('hidden');
    }

    function closeProductDetail() {
      document.getElementById('productDetailOverlay').classList.add('hidden');
      _selectedProduct = null;
    }

    function openImageZoom(src, title) {
      const img = document.getElementById('imageZoomImg');
      document.getElementById('imageZoomTitle').textContent = title || '이미지 크게 보기';
      img.src = src;
      img.onerror = function() { img.removeAttribute('src'); };
      document.getElementById('imageZoomOverlay').classList.remove('hidden');
    }

    function closeImageZoom() {
      const img = document.getElementById('imageZoomImg');
      img.removeAttribute('src');
      document.getElementById('imageZoomOverlay').classList.add('hidden');
    }

    async function requestOrder(productId, productName, price) {
      if (!_shopSession) { alert('로그인이 필요합니다.'); return; }
      const available = _userBalance - _userPending;
      if (available < price) {
        logWarn('ORDER_INSUFFICIENT_BALANCE', { 상품명: productName, 금액: price, balance: _userBalance, pending: _userPending, available });
        alert(`사용 가능한 달란트가 부족합니다.\n잔여: ${fmtNum(_userBalance)} / 사용 대기: ${fmtNum(_userPending)} / 사용 가능: ${fmtNum(available)}`);
        return;
      }
      if (!confirm(`"${productName}"을(를) 구매 신청하시겠습니까?\n가격: ${fmtNum(price)} 달란트\n\n사용 가능 달란트: ${fmtNum(available)}`)) return;

      try {
        const { data, error } = await _sb.rpc('request_product_order', {
          p_user_id: _shopSession.id,
          p_product_id: productId,
          p_product_name: productName,
          p_price: price
        });
        if (error) {
          await logError('ORDER_REQUEST_FAIL', { productId, 상품명: productName, 금액: price, 오류: error.message });
          alert('구매 신청 실패: ' + tErr(error.message));
          return;
        }
        if (data && data.success === false) {
          await logWarn('ORDER_REQUEST_DENIED', { 상품명: productName, 금액: price, 사유: data.error });
          alert(tErr(data.error));
          return;
        }
        _userPending += price;
        await logInfo('ORDER_REQUEST_SUCCESS', { 상품명: productName, 금액: price, orderId: data?.order_id });
        sendSlackNotify('purchase_new', { 신청자: _shopSession.displayName || _shopSession.username, 상품명: productName, 금액: price, 유형: '일반 구매', 부서: _shopSession.departmentName || '' });
        alert('✅ 구매 신청이 완료되었습니다!');
        renderShopProducts();
      } catch (err) {
        await logError('ORDER_REQUEST_ERROR', { 상품명: productName, 금액: price, 오류: String(err) });
        alert('구매 신청 중 오류가 발생했습니다: ' + tErr(err.message));
      }
    }

    document.getElementById('productDetailOverlay').addEventListener('click', e => {
      if (e.target.classList.contains('product-detail-overlay')) closeProductDetail();
    });
    document.getElementById('imageZoomOverlay').addEventListener('click', e => {
      if (e.target.classList.contains('image-zoom-overlay')) closeImageZoom();
    });

    let _proxyUsers = [];
    let _proxyTarget = null;
    let _proxyTimer = null;
    let _proxyDeptMap = {};

    function openProxyModal() {
      document.getElementById('proxyModal').style.display = 'flex';
      document.getElementById('proxySearch').value = '';
      document.getElementById('proxySearch').style.display = '';
      document.getElementById('proxyResults').style.display = 'none';
      document.getElementById('proxySelected').style.display = 'none';
      document.getElementById('proxyProductArea').style.display = 'none';
      document.getElementById('btnProxyConfirm').disabled = true;
      _proxyTarget = null;
      loadProxyUsers();
    }

    function closeProxyModal() { document.getElementById('proxyModal').style.display = 'none'; }

    async function loadProxyUsers() {
      const rank = _shopSession.permissionRank || 0;
      const resultsBox = document.getElementById('proxyResults');
      resultsBox.innerHTML = '<div style="padding:0.6rem;color:#868e96;font-size:0.85rem;">대상자를 불러오는 중...</div>';
      resultsBox.style.display = 'block';

      let users = [];
      try {
        const opts = {};
        if (rank >= 90) {
          // all users
        } else if (rank >= 60) {
          const deptId = _shopSession.managedDeptId || _shopSession.departmentId;
          if (!deptId) {
            _proxyUsers = [];
            resultsBox.innerHTML = '<div style="padding:0.6rem;color:#868e96;font-size:0.85rem;">담당 부서가 설정되지 않았습니다.</div>';
            return;
          }
          opts.departmentId = deptId;
        } else if (rank === 40) {
          if (!_shopSession.departmentId || !_shopSession.classNumber) {
            _proxyUsers = [];
            resultsBox.innerHTML = '<div style="padding:0.6rem;color:#868e96;font-size:0.85rem;">담당 부서/반이 설정되지 않았습니다.</div>';
            return;
          }
          opts.userType = 'student';
          opts.departmentId = _shopSession.departmentId;
        } else {
          _proxyUsers = [];
          resultsBox.innerHTML = '<div style="padding:0.6rem;color:#868e96;font-size:0.85rem;">대리 구매 권한이 없습니다.</div>';
          return;
        }

        const { data, error } = await fetchUsers(opts);
        if (error) {
          await logWarn('PROXY_USER_LOAD_FAIL', { 오류: error });
          resultsBox.innerHTML = '<div style="padding:0.6rem;color:#e03131;font-size:0.85rem;">대상자를 불러오지 못했습니다.</div>';
          _proxyUsers = [];
          return;
        }
        users = data || [];
      } catch (err) {
        await logError('PROXY_USER_LOAD_ERROR', { 오류: String(err) });
        resultsBox.innerHTML = '<div style="padding:0.6rem;color:#e03131;font-size:0.85rem;">대상자를 불러오지 못했습니다.</div>';
        _proxyUsers = [];
        return;
      }

      users = users.filter(u => u.id !== _shopSession.id);
      if (rank === 40) {
        users = users.filter(u =>
          u.user_type === 'student' &&
          u.department_id === _shopSession.departmentId &&
          u.class_number === _shopSession.classNumber
        );
      }
      _proxyUsers = users;
      try { const { data: depts } = await _sb.from('departments').select('id,name'); (depts||[]).forEach(d => { _proxyDeptMap[d.id] = d.name; }); } catch(e){}

      resultsBox.style.display = 'none';
      const q = document.getElementById('proxySearch').value.trim();
      if (q) onProxySearch();
    }

    function onProxySearch() {
      clearTimeout(_proxyTimer);
      _proxyTimer = setTimeout(() => {
        const q = document.getElementById('proxySearch').value.trim().toLowerCase();
        const box = document.getElementById('proxyResults');
        if (q.length < 1) { box.style.display = 'none'; return; }
        const matches = _proxyUsers.filter(u =>
          (u.display_name || '').toLowerCase().includes(q) || (u.username || '').toLowerCase().includes(q)
        ).slice(0, 10);
        if (matches.length === 0) {
          box.innerHTML = '<div style="padding:0.6rem;color:#868e96;font-size:0.85rem;">검색 결과가 없습니다.</div>';
        } else {
          box.innerHTML = matches.map(u => {
            const dName = _proxyDeptMap[u.department_id] || '';
            const cls = u.class_number ? u.class_number + '반' : '';
            const extra = [u.user_type === 'student' ? '학생' : '교사', dName, cls].filter(Boolean).join(' · ');
            return `<div style="padding:0.5rem 0.8rem;cursor:pointer;border-bottom:1px solid var(--t-border, #f0f0f0);font-size:0.88rem;color:var(--t-text, #212529);" onmousedown="selectProxy('${u.id}')" onmouseover="this.style.background='var(--t-accent-surface, #f3f0ff)'" onmouseout="this.style.background=''">
            <strong>${u.display_name || u.username}</strong>
            <span style="margin-left:0.4rem;color:#868e96;font-size:0.78rem;">${extra}</span>
          </div>`;
          }).join('');
        }
        box.style.display = 'block';
      }, 200);
    }

    function selectProxy(uid) {
      const u = _proxyUsers.find(x => x.id === uid);
      if (!u) return;
      _proxyTarget = u;
      document.getElementById('proxyResults').style.display = 'none';
      document.getElementById('proxySearch').style.display = 'none';
      document.getElementById('proxySelectedInfo').innerHTML = `<strong>${u.display_name || u.username}</strong> (${u.user_type === 'student' ? '학생' : '교사'})`;
      document.getElementById('proxySelected').style.display = 'block';

      const bal = (u.talent_balance || 0) - (u.pending_talent || 0);
      const targetType = u.user_type === 'student' ? 'student' : 'teacher';
      const products = allShopProducts.filter(p => p.target_role === targetType && p.is_active);
      document.getElementById('proxyProduct').innerHTML = '<option value="">상품 선택</option>' +
        products.map(p => `<option value="${p.id}" data-price="${p.price}" ${p.price > bal ? 'disabled' : ''}>${p.name} (${fmtNum(p.price)} 달란트)${p.price > bal ? ' - 잔액부족' : ''}</option>`).join('');
      document.getElementById('proxyBalanceInfo').textContent = `사용 가능 달란트: ${fmtNum(bal)}`;
      document.getElementById('proxyProductArea').style.display = 'block';
      document.getElementById('proxyProduct').onchange = () => {
        document.getElementById('btnProxyConfirm').disabled = !document.getElementById('proxyProduct').value;
      };
    }

    function clearProxy() {
      _proxyTarget = null;
      document.getElementById('proxySelected').style.display = 'none';
      document.getElementById('proxyProductArea').style.display = 'none';
      document.getElementById('proxySearch').style.display = 'block';
      document.getElementById('proxySearch').value = '';
      document.getElementById('btnProxyConfirm').disabled = true;
    }

    async function confirmProxy() {
      if (!_proxyTarget) return;
      const sel = document.getElementById('proxyProduct');
      const opt = sel.options[sel.selectedIndex];
      if (!opt || !opt.value) return;
      const productId = opt.value;
      const price = parseInt(opt.dataset.price, 10);
      const product = allShopProducts.find(p => p.id === productId);
      if (!product) return;

      if (!confirm(`"${product.name}"을(를) ${_proxyTarget.display_name || _proxyTarget.username}님 명의로 대리 구매 신청하시겠습니까?\n가격: ${price} 달란트`)) return;

      try {
        const { data, error } = await _sb.rpc('request_product_order', {
          p_user_id: _proxyTarget.id,
          p_product_id: productId,
          p_product_name: product.name,
          p_price: price
        });
        if (error) {
          await logError('PROXY_ORDER_FAIL', { targetUser: _proxyTarget.id, 상품명: product.name, 오류: error.message });
          alert('대리 구매 실패: ' + tErr(error.message));
          return;
        }
        if (data && data.success === false) {
          await logWarn('PROXY_ORDER_DENIED', { targetUser: _proxyTarget.id, 상품명: product.name, 사유: data.error });
          alert(tErr(data.error));
          return;
        }
        await logInfo('PROXY_ORDER_SUCCESS', { targetUser: _proxyTarget.id, 대상: _proxyTarget.display_name, 상품명: product.name, 금액: price });
        sendSlackNotify('purchase_new', { 신청자: _proxyTarget.display_name || _proxyTarget.username, 상품명: product.name, 금액: price, 유형: '대리 구매 (' + (_shopSession.displayName || _shopSession.username) + ')', 부서: _proxyDeptMap[_proxyTarget.department_id] || '' });
        alert(`✅ ${_proxyTarget.display_name || _proxyTarget.username}님 명의로 대리 구매 신청 완료!`);
        closeProxyModal();
      } catch (err) {
        await logError('PROXY_ORDER_ERROR', { 오류: String(err) });
        alert('대리 구매 중 오류: ' + tErr(err.message));
      }
    }
  </script>
