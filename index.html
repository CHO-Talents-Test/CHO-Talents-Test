<!DOCTYPE html>
<html lang="ko" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>달란트 마을 - CHO Talents</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>" />
  <link rel="stylesheet" href="css/themes.css?v=3.59.0" />
  <link rel="stylesheet" href="css/common.css?v=3.59.0" />
  <link rel="stylesheet" href="css/style.css?v=3.59.0" />
  <style>
    .announcement-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .announcement-overlay.hidden { display: none; }
    .announcement-modal { width: min(560px, 96vw); max-height: 86vh; overflow: hidden; background: var(--t-card, #fff); color: var(--t-text, #222); border: 1px solid var(--t-border, #e9ecef); border-radius: 8px; box-shadow: 0 16px 42px rgba(0,0,0,0.22); display: flex; flex-direction: column; }
    .announcement-head { padding: 1rem 1.1rem; border-bottom: 1px solid var(--t-border, #e9ecef); display: flex; justify-content: space-between; align-items: flex-start; gap: 0.8rem; }
    .announcement-head h3 { margin: 0; font-size: 1.05rem; line-height: 1.35; }
    .announcement-close { border: 1px solid var(--t-border, #dee2e6); background: var(--t-bg, #f8f9fa); color: var(--t-text, #222); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; flex: 0 0 auto; }
    .announcement-meta { padding: 0.65rem 1.1rem 0; color: var(--t-text-muted, #868e96); font-size: 0.78rem; }
    .announcement-image-wrap { padding: 0.85rem 1.1rem 0; }
    .announcement-image-wrap img { display: block; width: 100%; max-height: 220px; object-fit: contain; border: 1px solid var(--t-border, #e9ecef); border-radius: 8px; background: var(--t-bg, #f8f9fa); cursor: zoom-in; }
    .announcement-body { padding: 0.85rem 1.1rem 1rem; overflow-y: auto; white-space: pre-wrap; line-height: 1.65; font-size: 0.92rem; }
    .announcement-actions { padding: 0.85rem 1.1rem 1rem; border-top: 1px solid var(--t-border, #e9ecef); display: flex; justify-content: flex-end; gap: 0.5rem; flex-wrap: wrap; }
    .announcement-btn { border: 1px solid var(--t-border, #dee2e6); border-radius: 8px; padding: 0.55rem 0.8rem; background: var(--t-bg, #f8f9fa); color: var(--t-text, #222); cursor: pointer; font-weight: 700; }
    .announcement-btn.primary { background: var(--admin-primary, #6c5ce7); border-color: var(--admin-primary, #6c5ce7); color: #fff; }
    .image-zoom-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .image-zoom-overlay.hidden { display: none; }
    .image-zoom-modal { width: min(92vw, 1000px); max-height: 92vh; background: var(--t-card, #fff); color: var(--t-text, #222); border: 1px solid var(--t-border, #e9ecef); border-radius: 10px; box-shadow: 0 18px 50px rgba(0,0,0,0.25); overflow: hidden; display: flex; flex-direction: column; }
    .image-zoom-head { padding: 1rem 1.1rem; border-bottom: 1px solid var(--t-border, #e9ecef); display: flex; justify-content: space-between; align-items: flex-start; gap: 0.8rem; }
    .image-zoom-head h3 { margin: 0; font-size: 1.05rem; line-height: 1.35; }
    .image-zoom-close { border: 1px solid var(--t-border, #dee2e6); background: var(--t-bg, #f8f9fa); color: var(--t-text, #222); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; flex: 0 0 auto; }
    .image-zoom-body { padding: 1rem 1.1rem 1.1rem; overflow: auto; }
    .image-zoom-body img { display: block; max-width: 100%; max-height: 74vh; margin: 0 auto; object-fit: contain; }
  </style>
</head>
<body>
  <div class="falling-stars" id="fallingStars"></div>

  <div id="nav-container"></div>

  <main class="main">
    <section class="hero">
      <div class="hero-badge">✝ 금란교회 초등부</div>
      <h1 class="hero-title">
        <span class="wave-text" style="--i:0">달</span><span class="wave-text" style="--i:1">란</span><span class="wave-text" style="--i:2">트</span>
        <span class="wave-text space" style="--i:3">&nbsp;</span>
        <span class="wave-text highlight" style="--i:4">마</span><span class="wave-text highlight" style="--i:5">을</span>
      </h1>
      <p class="hero-sub">우리의 달란트로 세상을 아름답게! ❤️</p>

      <div class="village-layout">
        <div class="village-center">
          <div class="mascots">
            <div class="mascot bounce-1">🌟</div>
            <div class="mascot bounce-2">🎁</div>
            <div class="mascot bounce-3">🏆</div>
          </div>
          <div class="feature-cards-header" id="favHeader" style="display:none;">
            <button class="fav-setting-btn" onclick="openFavModal()">⭐ 즐겨찾기 설정</button>
          </div>
          <div class="feature-cards" id="featureCards">
            <a href="earn-talents.html" class="card" style="border-color:var(--accent)">
              <div class="card-icon">💰</div>
              <h3>달란트 적립</h3>
              <p>열심히 활동하고<br/>달란트를 모아요!</p>
            </a>
            <a href="shop.html" class="card" style="border-color:var(--mint)">
              <div class="card-icon">🛒</div>
              <h3>상품 구매</h3>

            </a>
            <a href="my-talents.html" class="card" style="border-color:var(--sky)">
              <div class="card-icon">🏅</div>
              <h3>내 달란트</h3>
              <p>내가 모은 달란트를<br/>확인해 봐요!</p>

          </div>
        </div>
      </div>

      <div class="guest-guide-banner" id="guestGuideBanner" style="display:none;">
        <div class="guest-guide-inner">
          <span class="guest-guide-icon">📖</span>
          <div class="guest-guide-text">
            <strong>처음 방문하셨나요?</strong>
            <span>사용 가이드에서 달란트 마을 이용 방법을 확인해 보세요!</span>
          </div>
          <a href="guide.html" class="guest-guide-btn">가이드 보기</a>

      </div>

      <div class="status-box" id="statusBox">
        <div class="status-icon">🔗</div>
        <div class="status-text">

          <span class="status-value" id="statusValue">확인 중...</span>

      </div>
    </section>
  </main>

  <footer class="footer">
    <p>초등부 달란트 관리 &copy; 2026 CHO-Talents</p>
  </footer>

  <!-- Favorites Modal -->
  <div class="fav-overlay" id="favOverlay" style="display:none;" onclick="closeFavModal()">
    <div class="fav-modal" onclick="event.stopPropagation()">
      <div class="fav-modal-header">
        <h3>⭐ 즐겨찾기 설정</h3>
        <button class="fav-modal-close" onclick="closeFavModal()">&times;</button>
      </div>
      <p class="fav-modal-desc" id="favModalDesc">메인 화면에 표시할 바로가기를 선택하세요 (최소 1개)</p>
      <div class="fav-list" id="favList"></div>
      <div class="fav-modal-footer">
        <button class="fav-btn-reset" onclick="resetFavorites()">↩ 기본값 복원</button>

  </div>

  <div class="image-zoom-overlay hidden" id="imageZoomOverlay">
    <div class="image-zoom-modal" role="dialog" aria-modal="true" aria-labelledby="imageZoomTitle">
      <div class="image-zoom-head">
        <h3 id="imageZoomTitle">이미지 크게 보기</h3>
        <button class="image-zoom-close" type="button" onclick="closeImageZoom()">&times;</button>
      </div>
      <div class="image-zoom-body">
        <img id="imageZoomImg" alt="확대 이미지" />
      </div>
    </div>

      { id:'my-talents',    href:'my-talents.html',          icon:'🏅', title:'내 달란트',     desc:'내가 모은 달란트를 확인해 봐요!',             color:'var(--sky)',     minRank:0 },

      { id:'talent-receive',href:'talent-receive.html',      icon:'📱', title:'달란트 수령',   desc:'QR 코드로 달란트를 수령해요!',               color:'#fd79a8',       minRank:20 },

      { id:'teacher-guide', href:'teacher-guide.html',       icon:'👩‍🏫', title:'교사 가이드',  desc:'교사 전용 사용 가이드',                      color:'#e17055',       minRank:40 },
      { id:'admin-guide',   href:'admin-guide.html',         icon:'🛠️', title:'관리자 가이드', desc:'관리자 전용 사용 가이드',                     color:'#d63031',       minRank:60 },
      { id:'admin-dash',    href:'admin/index.html',         icon:'📊', title:'대시보드',      desc:'관리 현황을 한눈에 확인!',                    color:'#6c5ce7',       minRank:60 },
      { id:'admin-talents', href:'admin/talents.html',       icon:'🎯', title:'달란트 관리',   desc:'달란트를 지급하고 관리해요!',                 color:'#fdcb6e',       minRank:40 },
      { id:'admin-stats',   href:'admin/talent-stats.html',  icon:'📈', title:'달란트 통계',   desc:'달란트 통계를 확인해요!',                     color:'#55efc4',       minRank:60 },
      { id:'admin-users',   href:'admin/users.html',         icon:'👥', title:'사용자 관리',   desc:'사용자를 관리해요!',                          color:'#74b9ff',       minRank:60 },
      { id:'admin-purch',   href:'admin/purchases.html',     icon:'💳', title:'구매 관리',     desc:'구매 요청을 처리해요!',                       color:'#ffeaa7',       minRank:60 },
      { id:'admin-depts',   href:'admin/departments.html',   icon:'🏢', title:'부서 관리',     desc:'부서를 관리해요!',                            color:'#81ecec',       minRank:60 },
      { id:'admin-qr',      href:'admin/talent-qr.html',     icon:'📷', title:'QR 관리',      desc:'달란트 QR 코드를 관리해요!',                  color:'#fab1a0',       minRank:90 },
      { id:'admin-shop',    href:'admin/shop.html',          icon:'🏪', title:'상품 관리',     desc:'상품을 등록하고 관리해요!',                   color:'#dfe6e9',       minRank:60 },
      { id:'admin-items',   href:'admin/talent-items.html',  icon:'🎯', title:'달란트 항목',   desc:'달란트 항목을 등록하고 관리해요!',             color:'#00b894',       minRank:60 },
      { id:'admin-bulk',    href:'admin/bulk-register.html', icon:'📋', title:'학생 일괄 등록', desc:'엑셀로 학생 계정을 일괄 생성해요!',            color:'#2d3436',       minRank:80 },
      { id:'admin-mgrs',    href:'admin/managers.html',      icon:'👑', title:'관리자 관리',   desc:'관리자를 등록하고 관리해요!',                  color:'#e67700',       minRank:80 },
      { id:'admin-perm',    href:'docs/page-permission-rules.html', icon:'🔐', title:'페이지 권한 룰', desc:'페이지별 접근 권한을 확인해요!',       color:'#636e72',       minRank:80 },
      { id:'admin-logrule', href:'admin/log-rules.html',     icon:'📝', title:'로그 작성 룰',   desc:'로그 작성 규칙을 확인해요!',                  color:'#b2bec3',       minRank:80 },
      { id:'admin-auditrule',href:'admin/audit-rules.html',  icon:'📃', title:'작업 이력 룰',   desc:'작업 이력 작성 규칙을 확인해요!',             color:'#dfe6e9',       minRank:80 },
      { id:'admin-notices',  href:'admin/notices.html',      icon:'📢', title:'공지 관리',      desc:'로그인 공지를 등록하고 관리해요!',             color:'#ffe066',       minRank:90 },
      { id:'admin-ver',     href:'admin/versions.html',      icon:'🔖', title:'버전',          desc:'버전 업데이트 이력을 확인해요!',               color:'#636e72',       minRank:80 },
      { id:'admin-report',  href:'admin/reports.html',       icon:'📑', title:'보고서',         desc:'운영 보고서를 확인해요!',                     color:'#00cec9',       minRank:80 },
      { id:'admin-access',  href:'admin/page-access.html',   icon:'🔑', title:'페이지 접근',   desc:'페이지 접근 권한을 설정해요!',                color:'#e17055',       minRank:100 },
      { id:'admin-feat',    href:'admin/page-features.html', icon:'⚙️', title:'페이지 기능',   desc:'페이지 기능 권한을 설정해요!',                color:'#d63031',       minRank:100 },
      { id:'admin-audit',   href:'admin/audit.html',         icon:'📜', title:'작업 이력',      desc:'작업 이력을 확인해요!',                       color:'#6c5ce7',       minRank:100 },
      { id:'admin-logs',    href:'admin/logs.html',          icon:'🗂️', title:'로그',           desc:'시스템 로그를 확인해요!',                     color:'#fd79a8',       minRank:100 },
    ];
    const DEFAULT_FAV_IDS = ['earn-talents','shop','my-talents'];
    const MAX_FAV_MOBILE = 10;
    const MAX_FAV_PC = 10;

    let _favSession = null, _favRank = 0;

    function _favKey() { return _favSession ? 'cho_fav_' + _favSession.id : ''; }
    function _getMaxFav() { return window.innerWidth <= 768 ? MAX_FAV_MOBILE : MAX_FAV_PC; }

    function _normalizeFavIds(ids) {
      if (!Array.isArray(ids)) return [];
      return Array.from(new Set(ids.filter(Boolean)));
    }

    function _getNavItemRule(href) {
      if (typeof NAV_MENU === 'undefined' || !Array.isArray(NAV_MENU)) return null;
      const allItems = NAV_MENU.flatMap(group => group.items || []);
      return allItems.find(item => item.href === href) || null;
    }

    function _isShortcutVisible(shortcut) {
      const navRule = _getNavItemRule(shortcut.href);
      const minRank = navRule && typeof navRule.minPerm === 'number' ? navRule.minPerm : (shortcut.minRank || 0);
      const authOnly = !!(navRule && navRule.authOnly);
      if (authOnly && !_favSession) return false;
      return _favRank >= minRank;
    }

    async function loadFavIds() {
      if (_favSession && _sb) {
        try {
          const { data } = await _sb.from('user_preferences').select('favorite_shortcuts').eq('user_id', _favSession.id).single();
          if (data && data.favorite_shortcuts) return _normalizeFavIds(data.favorite_shortcuts);
        } catch(e) {}
      }
      try {
        const k = _favKey();
        if (k) {
          const r = localStorage.getItem(k);
          if (r) return _normalizeFavIds(JSON.parse(r));
        }
      } catch(e) {}
      return null;
    }

    function getAvailable() {
      return ALL_SHORTCUTS.filter(_isShortcutVisible);
    }

    function getSanitizedFavIds(ids) {
      const availableIds = new Set(getAvailable().map(s => s.id));
      return _normalizeFavIds(ids).filter(id => availableIds.has(id)).slice(0, _getMaxFav());
    }

    async function renderFavCards() {
      const ids = getSanitizedFavIds(await loadFavIds() || DEFAULT_FAV_IDS);
      const avail = getAvailable();
      const cards = ids.map(id => avail.find(s => s.id === id)).filter(Boolean);
      if (!cards.length) DEFAULT_FAV_IDS.forEach(id => { const f = avail.find(s => s.id === id); if (f) cards.push(f); });
      const el = document.getElementById('featureCards');
      el.innerHTML = cards.map(c =>
        `<a href="${c.href}" class="card" style="border-color:${c.color}">` +
          `<div class="card-icon">${c.icon}</div>` +
          `<h3>${c.title}</h3>` +
          `<p>${c.desc}</p>` +
        `</a>`
      ).join('');
      const cols = Math.min(cards.length, window.innerWidth <= 480 ? 2 : window.innerWidth <= 768 ? 3 : 5);
      el.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    }

    async function openFavModal() {
      const ids = getSanitizedFavIds(await loadFavIds() || DEFAULT_FAV_IDS);
      const avail = getAvailable();
      const maxFav = _getMaxFav();
      document.getElementById('favModalDesc').textContent =
        `메인 화면에 표시할 바로가기를 선택하세요 (최소 1개, 최대 ${maxFav}개)`;
      document.getElementById('favList').innerHTML = avail.map(s => {
        const chk = ids.includes(s.id) ? 'checked' : '';
        return `<label class="fav-item">` +
          `<span class="fav-item-icon">${s.icon}</span>` +
          `<span class="fav-item-info"><span class="fav-item-title">${s.title}</span><span class="fav-item-desc">${s.desc}</span></span>` +
          `<input type="checkbox" class="fav-check" value="${s.id}" ${chk}/>` +
          `<span class="fav-toggle"></span>` +
        `</label>`;
      }).join('');
      document.getElementById('favOverlay').style.display = '';
    }

    function closeFavModal() { document.getElementById('favOverlay').style.display = 'none'; }

    async function saveFavorites() {
      const checked = document.querySelectorAll('#favList .fav-check:checked');
      const ids = getSanitizedFavIds(Array.from(checked).map(c => c.value));
      const maxFav = _getMaxFav();
      if (!ids.length) { alert('최소 1개 이상의 바로가기를 선택해주세요.'); return; }
      if (ids.length > maxFav) { alert(`최대 ${maxFav}개까지 선택할 수 있습니다.`); return; }
      if (_favSession && _sb) {
        try {
          await _sb.from('user_preferences').upsert({ user_id: _favSession.id, favorite_shortcuts: ids, updated_at: new Date().toISOString() });
        } catch(e) {}
      }
      try { localStorage.setItem(_favKey(), JSON.stringify(ids)); } catch(e) {}
      await renderFavCards();
      closeFavModal();
    }

    async function resetFavorites() {
      if (_favSession && _sb) {
        try { await _sb.from('user_preferences').delete().eq('user_id', _favSession.id); } catch(e) {}
      }
      try { localStorage.removeItem(_favKey()); } catch(e) {}
      await renderFavCards();
      closeFavModal();
    }

    function escapeAnnouncementHtml(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    function openImageZoom(src, title) {
      const overlay = document.getElementById('imageZoomOverlay');
      const img = document.getElementById('imageZoomImg');
      document.getElementById('imageZoomTitle').textContent = title || '이미지 크게 보기';
      img.src = src;
      img.onerror = function() { img.removeAttribute('src'); };
      overlay.classList.remove('hidden');
    }

    function closeImageZoom() {
      const overlay = document.getElementById('imageZoomOverlay');
      const img = document.getElementById('imageZoomImg');
      img.removeAttribute('src');
      overlay.classList.add('hidden');
    }

    function ensureAnnouncementModal() {
      let overlay = document.getElementById('announcementOverlay');
      if (overlay) return overlay;
      overlay = document.createElement('div');
      overlay.id = 'announcementOverlay';
      overlay.className = 'announcement-overlay hidden';
      overlay.innerHTML =
        '<div class="announcement-modal" role="dialog" aria-modal="true" aria-labelledby="announcementTitle">' +
          '<div class="announcement-head"><h3 id="announcementTitle"></h3></div>' +
          '<div class="announcement-meta" id="announcementMeta"></div>' +
          '<div class="announcement-image-wrap" id="announcementImageWrap" style="display:none;"><img id="announcementImage" alt="공지 이미지" /></div>' +
          '<div class="announcement-body" id="announcementBody"></div>' +
          '<div class="announcement-actions">' +
            '<button class="announcement-btn" type="button" onclick="closeAnnouncementPopup()">닫기</button>' +
            '<button class="announcement-btn primary" type="button" onclick="dismissCurrentAnnouncement()">다시 열지 않음</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);
      overlay.addEventListener('click', e => {
        if (e.target === overlay) closeAnnouncementPopup();
      });
      return overlay;
    }

    let _announcementQueue = [];
    let _currentAnnouncement = null;
    let _announcementSession = null;

    async function showActiveAnnouncements(session) {
      if (!_sb || !session || !session.id) return;
      _announcementSession = session;
      try {
        const { data: activeNotices, error } = await _sb
          .from('announcements')
          .select('*')
          .eq('is_active', true)
          .order('created_at', { ascending: false })
          .limit(20);
        if (error && /is_deleted|column|does not exist/i.test(error.message || '')) {
          const fallback = await _sb
            .from('announcements')
            .select('*')
            .eq('is_active', true)
            .order('created_at', { ascending: false })
            .limit(20);
          if (fallback.error || !fallback.data || !fallback.data.length) return;
          const ids = fallback.data.map(n => n.id);
          const { data: dismissed } = await _sb
            .from('announcement_dismissals')
            .select('announcement_id')
            .eq('user_id', session.id)
            .in('announcement_id', ids);
          const dismissedIds = new Set((dismissed || []).map(d => d.announcement_id));
          _announcementQueue = fallback.data.filter(n => !dismissedIds.has(n.id));
          showNextAnnouncement();
          return;
        }
        if (error || !activeNotices || !activeNotices.length) return;

        const ids = activeNotices.map(n => n.id);
        const { data: dismissed } = await _sb
          .from('announcement_dismissals')
          .select('announcement_id')
          .eq('user_id', session.id)
          .in('announcement_id', ids);
        const dismissedIds = new Set((dismissed || []).map(d => d.announcement_id));
        _announcementQueue = activeNotices.filter(n => !dismissedIds.has(n.id));
        showNextAnnouncement();
      } catch (err) {
        console.warn('[Announcement] load skipped:', err.message || err);
      }
    }

    function showNextAnnouncement() {
      _currentAnnouncement = _announcementQueue.shift() || null;
      if (!_currentAnnouncement) return;
      const overlay = ensureAnnouncementModal();
      document.getElementById('announcementTitle').textContent = _currentAnnouncement.title || '공지';
      document.getElementById('announcementMeta').textContent =
        '등록일 ' + formatKSTShort(_currentAnnouncement.created_at);
      const imageWrap = document.getElementById('announcementImageWrap');
      const imageEl = document.getElementById('announcementImage');
      if (_currentAnnouncement.image_url) {
        imageEl.src = _currentAnnouncement.image_url;
        imageEl.onerror = function() {
          imageEl.removeAttribute('src');
          imageWrap.style.display = 'none';
        };
        imageEl.onclick = function() {
          openImageZoom(_currentAnnouncement.image_url, _currentAnnouncement.title || '공지 이미지');
        };
        imageWrap.style.display = 'block';
      } else {
        imageWrap.style.display = 'none';
        imageEl.removeAttribute('src');
        imageEl.onclick = null;
      }
      document.getElementById('announcementBody').innerHTML =
        escapeAnnouncementHtml(_currentAnnouncement.content).replace(/\n/g, '<br>');
      overlay.classList.remove('hidden');
    }

    function closeAnnouncementPopup(showNext = true) {
      const overlay = document.getElementById('announcementOverlay');
      if (overlay) overlay.classList.add('hidden');
      if (showNext) setTimeout(showNextAnnouncement, 0);
    }

    async function dismissCurrentAnnouncement() {
      if (!_currentAnnouncement || !_announcementSession) {
        closeAnnouncementPopup();
        return;
      }
      try {
        const { error } = await _sb.from('announcement_dismissals').upsert({
          announcement_id: _currentAnnouncement.id,
          user_id: _announcementSession.id,
          dismissed_at: new Date().toISOString()
        }, { onConflict: 'announcement_id,user_id' });
        if (error) throw error;
        await logInfo('ANNOUNCEMENT_DISMISS', {
          공지ID: _currentAnnouncement.id,
          제목: _currentAnnouncement.title
        });
        closeAnnouncementPopup(false);
        showNextAnnouncement();
      } catch (err) {
        await logError('ANNOUNCEMENT_DISMISS_FAIL', {
          공지ID: _currentAnnouncement.id,
          제목: _currentAnnouncement.title,
          오류: err.message || String(err)
        });
        alert('공지 숨김 처리에 실패했습니다: ' + tErr(err.message || String(err)));
      }
    }

    document.getElementById('imageZoomOverlay').addEventListener('click', e => {
      if (e.target.classList.contains('image-zoom-overlay')) closeImageZoom();
    });

    (async () => {
      if (!_sb) initSupabase();
      await navInit();

      let s = null;
      try { s = await loadAuthSession(); } catch (e) {}
      if (s) {
        const rank = s.permissionRank || 0;
        navUpdateAuth(s);
        _favSession = s;
        _favRank = rank;
        document.getElementById('favHeader').style.display = '';

        const lsKey = _favKey();
        if (lsKey) {
          try {
            const lsData = localStorage.getItem(lsKey);
            if (lsData) {
              const { data: existing } = await _sb.from('user_preferences').select('user_id').eq('user_id', s.id).single();
              if (!existing) {
                await _sb.from('user_preferences').insert({ user_id: s.id, favorite_shortcuts: JSON.parse(lsData) });
              }
            }
          } catch(e) {}
        }
        await renderFavCards();
        await showActiveAnnouncements(s);
      } else {
        const guestBanner = document.getElementById('guestGuideBanner');
        if (guestBanner) guestBanner.style.display = '';
      }

      await initTheme();
    })();
  </script>
  <script src="js/version.js?v=3.59.0"></script>
</body>
</html>
