<!DOCTYPE html>
<html lang="ko" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 일괄 등록 - 관리자</title>
  <link rel="stylesheet" href="../css/themes.css?v=3.57.0" />
  <link rel="stylesheet" href="../css/admin.css?v=3.57.0" />
</head>
<body class="admin-body">
  <div id="nav-container"></div>

  <div class="admin-container">
    <h2 style="margin-bottom:1rem;">📋 학생 일괄 등록</h2>

    <div class="admin-table-wrap" style="margin-bottom:1.5rem;">
      <div class="admin-table-header">
        <div class="admin-table-title">1. 엑셀 양식 다운로드</div>
      </div>
      <div style="padding:1rem;">
        <p style="font-size:0.88rem;margin-bottom:0.8rem;color:var(--t-text-muted);">
          아래 버튼으로 양식 파일을 다운로드하고, 양식에 맞게 학생 정보를 입력한 뒤 업로드하세요.
        </p>
        <button class="filter-btn" style="background:var(--admin-primary);color:#fff;padding:0.5rem 1rem;font-size:0.88rem;" onclick="downloadTemplate()">📥 양식 다운로드 (.xlsx)</button>
      </div>
    </div>

    <div class="admin-table-wrap" style="margin-bottom:1.5rem;">
      <div class="admin-table-header">
        <div class="admin-table-title">2. 엑셀 파일 업로드</div>
      </div>
      <div style="padding:1rem;">
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;" onchange="handleFile(event)" />
        <div id="dropZone" style="border:2px dashed var(--t-border, #dee2e6);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;background:var(--t-subtle-surface, #f8f9fa);transition:border-color 0.2s;" onclick="document.getElementById('fileInput').click()">
          <div style="font-size:2rem;margin-bottom:0.5rem;">📁</div>
          <div style="font-size:0.9rem;font-weight:600;color:var(--t-text);">클릭하거나 파일을 드래그하여 업로드</div>
          <div style="font-size:0.8rem;color:var(--t-text-muted);margin-top:0.3rem;">지원 형식: .xlsx, .xls, .csv</div>
        </div>
        <div id="fileInfo" style="display:none;margin-top:0.8rem;padding:0.6rem;background:var(--t-accent-surface, #f3f0ff);border-radius:8px;font-size:0.85rem;">
          <span id="fileName"></span>
          <button onclick="clearFile()" style="float:right;background:none;border:none;cursor:pointer;color:#ff6b6b;font-weight:700;">✕ 초기화</button>
        </div>
      </div>
    </div>

    <div class="admin-table-wrap" id="previewSection" style="display:none;margin-bottom:1.5rem;">
      <div class="admin-table-header">
        <div class="admin-table-title" id="previewTitle">3. 미리보기</div>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <span id="validCount" style="font-size:0.82rem;color:#2b8a3e;"></span>
          <span id="errorCount" style="font-size:0.82rem;color:#e03131;"></span>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table class="admin-table">
          <thead>
            <tr><th>#</th><th>아이디</th><th>이름</th><th>부서</th><th>반</th><th>상태</th></tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>
      <div style="padding:1rem;text-align:center;">
        <button class="filter-btn" id="btnRegister" style="background:#2b8a3e;color:#fff;padding:0.6rem 2rem;font-size:0.95rem;font-weight:700;" onclick="startRegistration()" disabled>✅ 일괄 등록 시작</button>
      </div>
    </div>

    <div class="admin-table-wrap" id="resultSection" style="display:none;margin-bottom:1.5rem;">
      <div class="admin-table-header">
        <div class="admin-table-title">4. 등록 결과</div>
      </div>
      <div style="padding:1rem;">
        <div id="resultSummary" style="font-size:0.9rem;margin-bottom:0.8rem;"></div>
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead><tr><th>#</th><th>아이디</th><th>이름</th><th>결과</th><th>사유</th></tr></thead>
            <tbody id="resultBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/public-config.js?v=3.57.0"></script>
  <script src="../js/supabase-config.js?v=3.57.0"></script>
  <script src="../js/activity-log.js?v=3.57.0"></script>
  <script src="../js/codes.js?v=3.57.0"></script>
  <script src="../js/auth.js?v=3.57.0"></script>
  <script src="../js/theme.js?v=3.57.0"></script>
  <script src="../js/nav.js?v=3.57.0"></script>
  <script src="../js/user-mgmt.js?v=3.57.0"></script>
  <script>
    initSupabase();
    let session = null;
    let _parsedRows = [];
    let _deptMap = {};

    (async () => {
      await navInit();
      session = await initPage(80, '../login.html');
      if (!session) return;
      navUpdateAuth(session);
      autoLogPageView();
      await loadDepartments();
      setupDragDrop();
    })();

    async function loadDepartments() {
      const { data } = await fetchDepartments();
      _deptMap = {};
      (data || []).forEach(d => {
        _deptMap[d.name] = d.id;
        _deptMap[d.name.replace(/\s/g, '')] = d.id;
      });
    }

    function setupDragDrop() {
      const zone = document.getElementById('dropZone');
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = '#228be6'; });
      zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.style.borderColor = '';
        if (e.dataTransfer.files.length > 0) {
          document.getElementById('fileInput').files = e.dataTransfer.files;
          processFile(e.dataTransfer.files[0]);
        }
      });
    }

    function downloadTemplate() {
      const header = [['아이디', '이름', '부서', '반']];
      const sample = [['student01', '홍길동', '1부', '1'], ['student02', '김철수', '2부', '2']];
      const ws = XLSX.utils.aoa_to_sheet([...header, ...sample]);
      ws['!cols'] = [{ wch: 15 }, { wch: 12 }, { wch: 10 }, { wch: 5 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '학생목록');
      XLSX.writeFile(wb, '학생_일괄등록_양식.xlsx');
    }

    function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      processFile(file);
    }

    function processFile(file) {
      document.getElementById('fileName').textContent = `📄 ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      document.getElementById('fileInfo').style.display = '';

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

          if (rows.length < 2) { alert('데이터가 없습니다. 양식을 확인해주세요.'); return; }

          const header = rows[0].map(h => String(h || '').trim());
          const idxId = header.findIndex(h => /아이디|id|username/i.test(h));
          const idxName = header.findIndex(h => /이름|name|display/i.test(h));
          const idxDept = header.findIndex(h => /부서|dept|department/i.test(h));
          const idxClass = header.findIndex(h => /반|class|번호/i.test(h));

          if (idxId < 0 || idxName < 0) {
            alert('필수 컬럼(아이디, 이름)을 찾을 수 없습니다.\n양식을 다운로드하여 사용해주세요.');
            return;
          }

          _parsedRows = [];
          for (let i = 1; i < rows.length; i++) {
            const r = rows[i];
            if (!r || r.length === 0 || (!r[idxId] && !r[idxName])) continue;
            const username = String(r[idxId] || '').trim();
            const displayName = String(r[idxName] || '').trim();
            const deptName = String(r[idxDept] || '').trim();
            const classNum = r[idxClass] != null ? String(r[idxClass]).trim() : '';

            let error = '';
            if (!username) error = '아이디 누락';
            else if (!/^[a-zA-Z0-9_-]+$/.test(username)) error = '아이디: 영문/숫자/_/- 만 가능';
            if (!displayName) error = error ? error + ', 이름 누락' : '이름 누락';

            const deptId = deptName ? (_deptMap[deptName] || _deptMap[deptName.replace(/\s/g, '')] || null) : null;
            if (deptName && !deptId) error = error ? error + ', 부서 없음' : `부서 "${deptName}" 없음`;

            _parsedRows.push({
              row: i + 1,
              username, displayName, deptName, deptId,
              classNumber: classNum ? parseInt(classNum, 10) || null : null,
              error
            });
          }
          renderPreview();
        } catch (err) {
          alert('파일 읽기 오류: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function clearFile() {
      document.getElementById('fileInput').value = '';
      document.getElementById('fileInfo').style.display = 'none';
      document.getElementById('previewSection').style.display = 'none';
      document.getElementById('resultSection').style.display = 'none';
      _parsedRows = [];
    }

    function renderPreview() {
      const validRows = _parsedRows.filter(r => !r.error);
      const errorRows = _parsedRows.filter(r => r.error);

      document.getElementById('previewTitle').textContent = `3. 미리보기 (총 ${_parsedRows.length}건)`;
      document.getElementById('validCount').textContent = `✅ 정상 ${validRows.length}건`;
      document.getElementById('errorCount').textContent = errorRows.length > 0 ? `❌ 오류 ${errorRows.length}건` : '';

      const tbody = document.getElementById('previewBody');
      tbody.innerHTML = _parsedRows.map((r, i) => `<tr style="${r.error ? 'background:var(--t-subtle-surface, #fff5f5);' : ''}">
        <td>${i + 1}</td>
        <td><strong>${r.username || '-'}</strong></td>
        <td>${r.displayName || '-'}</td>
        <td>${r.deptName || '-'}</td>
        <td>${r.classNumber != null ? r.classNumber : '-'}</td>
        <td>${r.error
          ? `<span style="color:#e03131;font-size:0.8rem;">❌ ${r.error}</span>`
          : '<span style="color:#2b8a3e;font-size:0.8rem;">✅ 정상</span>'}</td>
      </tr>`).join('');

      document.getElementById('previewSection').style.display = '';
      document.getElementById('btnRegister').disabled = validRows.length === 0;
    }

    async function startRegistration() {
      const validRows = _parsedRows.filter(r => !r.error);
      if (validRows.length === 0) { alert('등록 가능한 데이터가 없습니다.'); return; }
      if (!confirm(`정상 데이터 ${validRows.length}건을 일괄 등록합니다.\n초기 비밀번호는 "1234"입니다.\n\n계속하시겠습니까?`)) return;

      document.getElementById('btnRegister').disabled = true;
      document.getElementById('btnRegister').textContent = '⏳ 등록 중...';

      const results = [];
      let success = 0, fail = 0;

      for (const r of validRows) {
        try {
          const { error } = await createUser({
            username: r.username,
            password: '1234',
            displayName: r.displayName,
            userType: 'student',
            permissionLevel: 'student',
            departmentId: r.deptId || null,
            classNumber: r.classNumber
          });
          if (error) {
            results.push({ ...r, result: '실패', reason: tErr(error) });
            fail++;
          } else {
            results.push({ ...r, result: '성공', reason: '' });
            success++;
          }
        } catch (e) {
          results.push({ ...r, result: '실패', reason: e.message || String(e) });
          fail++;
        }
      }

      await logInfo('BULK_REGISTER', { 총건수: validRows.length, 성공: success, 실패: fail });

      document.getElementById('resultSummary').innerHTML =
        `<strong>등록 완료</strong>: 총 ${validRows.length}건 중 <span style="color:#2b8a3e;">성공 ${success}건</span>, <span style="color:#e03131;">실패 ${fail}건</span>`;

      document.getElementById('resultBody').innerHTML = results.map((r, i) => `<tr style="${r.result === '실패' ? 'background:var(--t-subtle-surface, #fff5f5);' : ''}">
        <td>${i + 1}</td>
        <td>${r.username}</td>
        <td>${r.displayName}</td>
        <td style="color:${r.result === '성공' ? '#2b8a3e' : '#e03131'};font-weight:700;">${r.result === '성공' ? '✅ 성공' : '❌ 실패'}</td>
        <td style="font-size:0.82rem;">${r.reason || '-'}</td>
      </tr>`).join('');

      document.getElementById('resultSection').style.display = '';
      document.getElementById('btnRegister').textContent = '✅ 등록 완료';
    }
  </script>
</body>
</html>
