<!DOCTYPE html>
<html lang="ko" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>달란트 항목 관리 - CHO Talents Admin</title>
  <link rel="stylesheet" href="../css/themes.css?v=3.60.0" />
  <link rel="stylesheet" href="../css/admin.css?v=3.60.0" />
</head>
<body class="admin-body">
  <div id="nav-container"></div>

  <div class="admin-container">
    <h2 style="margin-bottom:1rem;">🎯 달란트 지급 항목 관리</h2>
    <p style="color:var(--admin-text-muted);margin-bottom:1.5rem;">달란트 지급 시 선택할 수 있는 항목을 관리합니다. 학생은 항목당 주 1회만 지급 가능합니다.</p>

    <div class="filters" style="margin-bottom:1rem;">
      <button class="filter-btn active" id="tabStudent" onclick="switchTab('student')">🎒 학생용</button>
      <button class="filter-btn" id="tabTeacher" onclick="switchTab('teacher')">👩‍🏫 교사용</button>
      <span style="margin-left:auto;"></span>
      <button class="filter-btn" style="background:var(--admin-primary);color:#fff;" onclick="openAddModal()">+ 항목 추가</button>
    </div>

    <div class="admin-table-wrap">
      <div class="admin-table-header">
        <div class="admin-table-title" id="tableTitle">학생용 항목</div>
      </div>
      <table class="admin-table">
        <thead><tr><th>순서</th><th>항목명</th><th>지급 달란트</th><th>통계</th><th>상태</th><th>관리</th></tr></thead>
        <tbody id="itemList"><tr><td colspan="6" class="empty-state">로딩 중...</td></tr></tbody>
      </table>
      <div id="itemPaging" style="display:flex;justify-content:center;align-items:center;gap:0.3rem;margin-top:0.5rem;flex-wrap:wrap;"></div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="itemModal">
    <div class="modal-box" style="max-width:400px;">
      <h3 class="modal-title" id="modalTitle">항목 추가</h3>
      <div class="form-error" id="modalError"></div>
      <div style="margin-bottom:0.8rem;">
        <label style="font-weight:600;font-size:0.85rem;display:block;margin-bottom:0.3rem;">항목명</label>
        <input type="text" id="mName" style="width:100%;padding:0.6rem;border:1px solid var(--admin-border);border-radius:8px;" placeholder="예: 출석, 성경 읽기" />
      </div>
      <div style="display:flex;gap:0.8rem;margin-bottom:0.8rem;">
        <div style="flex:1;">
          <label style="font-weight:600;font-size:0.85rem;display:block;margin-bottom:0.3rem;">지급 달란트</label>
          <input type="number" id="mAmount" min="1" max="100" style="width:100%;padding:0.6rem;border:1px solid var(--admin-border);border-radius:8px;" placeholder="최대 100" />
        </div>
        <div style="flex:1;">
          <label style="font-weight:600;font-size:0.85rem;display:block;margin-bottom:0.3rem;">정렬 순서</label>
          <input type="number" id="mSort" min="0" style="width:100%;padding:0.6rem;border:1px solid var(--admin-border);border-radius:8px;" value="0" />
        </div>
      </div>
      <div style="margin-bottom:0.8rem;">
        <label style="font-weight:600;font-size:0.85rem;display:block;margin-bottom:0.3rem;">대상</label>
        <select id="mTarget" style="width:100%;padding:0.6rem;border:1px solid var(--admin-border);border-radius:8px;">
          <option value="student">학생</option>
          <option value="teacher">교사</option>
        </select>
      </div>
      <div style="margin-bottom:0.8rem;">
        <label style="font-weight:600;font-size:0.85rem;display:block;margin-bottom:0.3rem;">달란트 지급 규칙</label>
        <input type="text" id="mGivingRule" style="width:100%;padding:0.6rem;border:1px solid var(--admin-border);border-radius:8px;" placeholder="예: 매주 출석 시 지급" />
      </div>
      <div style="margin-bottom:0.8rem;">
        <label style="font-weight:600;font-size:0.85rem;display:block;margin-bottom:0.3rem;">달란트 지급 설명</label>
        <textarea id="mGivingDesc" rows="3" style="width:100%;padding:0.6rem;border:1px solid var(--admin-border);border-radius:8px;resize:vertical;" placeholder="예: 매주 주일 예배 출석 시 담당 교사가 지급합니다."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-confirm" onclick="saveItem()">저장</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/public-config.js?v=3.60.0"></script>
  <script src="../js/supabase-config.js?v=3.60.0"></script>
  <script src="../js/activity-log.js?v=3.60.0"></script>
  <script src="../js/codes.js?v=3.60.0"></script>
  <script src="../js/auth.js?v=3.60.0"></script>
  <script src="../js/theme.js?v=3.60.0"></script>
  <script src="../js/page-size.js?v=3.60.0"></script>
  <script src="../js/nav.js?v=3.60.0"></script>
  <script src="../js/talent.js?v=3.60.0"></script>
  <script>
    initSupabase();
    let session;
    let allItems = [];
    let editingId = null;
    let currentTab = 'student';
    function getItemPageSize() { return window.innerWidth <= 768 ? 10 : 20; }
    let itemPage = 1;
    let itemStatsMap = {};

    function getWeekStartKST() {
      const now = new Date();
      const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
      const day = kst.getUTCDay();
      const diff = day === 0 ? 6 : day - 1;
      kst.setUTCDate(kst.getUTCDate() - diff);
      kst.setUTCHours(0, 0, 0, 0);
      return new Date(kst.getTime() - 9 * 60 * 60 * 1000);
    }

    (async () => {
      await navInit();
      session = await initPage(60, '../login.html');
      if (!session) return;
      navUpdateAuth(session);
      autoLogPageView();
      updatePendingBadge();
      updateNavOrderBadge();
      updateLogBadge();
      loadItems();
    })();

    function switchTab(tab) {
      currentTab = tab;
      itemPage = 1;
      document.getElementById('tabStudent').classList.toggle('active', tab === 'student');
      document.getElementById('tabTeacher').classList.toggle('active', tab === 'teacher');
      renderItems();
    }

    async function loadItems() {
      const [itemRes] = await Promise.all([fetchAllTalentItems(), loadItemStats()]);
      const { data } = itemRes;
      allItems = data || [];
      renderItems();
    }

    async function loadItemStats() {
      itemStatsMap = {};
      let { data, error } = await _sb
        .from('talent_transactions')
        .select('talent_item_id, created_at, override_week_limit')
        .eq('type', 'earn')
        .not('talent_item_id', 'is', null);
      if (error && /column .*override_week_limit.*does not exist|schema cache/i.test(error.message || '')) {
        const fallback = await _sb
          .from('talent_transactions')
          .select('talent_item_id, created_at')
          .eq('type', 'earn')
          .not('talent_item_id', 'is', null);
        data = fallback.data;
        error = fallback.error;
      }
      if (error || !data) return;

      const weekStart = getWeekStartKST();
      data.forEach(row => {
        const itemId = row.talent_item_id;
        if (!itemId) return;
        const current = itemStatsMap[itemId] || { total: 0, week: 0, override: 0 };
        current.total += 1;
        if (row.override_week_limit) current.override += 1;
        if (row.created_at && new Date(row.created_at) >= weekStart) current.week += 1;
        itemStatsMap[itemId] = current;
      });
    }

    function renderItems() {
      const list = allItems.filter(i => i.target_type === currentTab);
      const label = getCodeLabel('talent_items.target_type', currentTab, currentTab === 'student' ? '학생' : '교사') + '용';
      document.getElementById('tableTitle').textContent = `${label} 항목 (${list.length}개)`;
      const tbody = document.getElementById('itemList');

      if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">등록된 항목이 없습니다.</td></tr>`;
        document.getElementById('itemPaging').innerHTML = '';
        return;
      }

      const pageSize = getItemPageSize();
      const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
      if (itemPage > totalPages) itemPage = totalPages;
      const startIdx = (itemPage - 1) * pageSize;
      const pageData = list.slice(startIdx, startIdx + pageSize);

      tbody.innerHTML = pageData.map(i => {
        const isQuick = i.is_quick_button === true;
        const stats = itemStatsMap[i.id] || { total: 0, week: 0, override: 0 };
        return `<tr${!i.is_active ? ' style="opacity:0.5;"' : ''}>
        <td>${i.sort_order}</td>
        <td><strong>${i.name}</strong>${isQuick ? ' <span style="font-size:0.7rem;background:#e7f5ff;color:#1971c2;padding:0.1rem 0.4rem;border-radius:4px;">⚡퀵</span>' : ''}</td>
        <td style="font-weight:700;color:#2b8a3e;">+${i.talent_amount}</td>
        <td style="font-size:0.82rem;line-height:1.4;">
          <div>총 ${stats.total}회</div>
          <div style="color:#1971c2;">이번 주 ${stats.week}회</div>
          ${stats.override > 0 ? `<div style="color:#e67700;">예외 ${stats.override}회</div>` : ''}
        </td>
        <td>${i.is_active ? '<span class="level-badge INFO">활성</span>' : '<span class="level-badge FATAL">비활성</span>'}</td>
        <td>
          <button class="filter-btn" onclick='openEditModal(${JSON.stringify(i).replace(/'/g,"&#39;")})'>수정</button>
          <button class="filter-btn" onclick="toggleActive('${i.id}', ${i.is_active})">${i.is_active ? '비활성화' : '활성화'}</button>
          ${i.is_active && (session.permissionRank || 0) >= 80 ? `<button class="filter-btn" style="${isQuick ? 'background:#1971c2;color:#fff;' : ''}" onclick="setQuickButton('${i.id}')">${isQuick ? '⚡퀵 해제' : '⚡퀵 지정'}</button>` : ''}
        </td>
      </tr>`;
      }).join('');
      renderItemPaging(totalPages);
    }

    function renderItemPaging(totalPages) {
      document.getElementById('itemPaging').innerHTML = buildPagingButtons(itemPage, totalPages, 'goItemPage(__PAGE__)');
    }
    function goItemPage(p) { itemPage = p; renderItems(); }

    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = '항목 추가';
      document.getElementById('mName').value = '';
      document.getElementById('mAmount').value = '';
      document.getElementById('mSort').value = '0';
      document.getElementById('mTarget').value = currentTab;
      document.getElementById('mGivingRule').value = '';
      document.getElementById('mGivingDesc').value = '';
      document.getElementById('modalError').classList.remove('show');
      document.getElementById('itemModal').classList.remove('hidden');
    }

    function openEditModal(item) {
      editingId = item.id;
      document.getElementById('modalTitle').textContent = '항목 수정';
      document.getElementById('mName').value = item.name;
      document.getElementById('mAmount').value = item.talent_amount;
      document.getElementById('mSort').value = item.sort_order;
      document.getElementById('mTarget').value = item.target_type;
      document.getElementById('mGivingRule').value = item.giving_rule || '';
      document.getElementById('mGivingDesc').value = item.giving_description || '';
      document.getElementById('modalError').classList.remove('show');
      document.getElementById('itemModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('itemModal').classList.add('hidden'); }

    async function saveItem() {
      const errEl = document.getElementById('modalError');
      const name = document.getElementById('mName').value.trim();
      const amount = parseInt(document.getElementById('mAmount').value);
      const sortOrder = parseInt(document.getElementById('mSort').value) || 0;
      const targetType = document.getElementById('mTarget').value;

      if (!name) { errEl.textContent = '항목명을 입력해주세요.'; errEl.classList.add('show'); return; }
      if (!amount || amount <= 0) { errEl.textContent = '유효한 달란트 수를 입력해주세요.'; errEl.classList.add('show'); return; }
      if (amount > 100) { errEl.textContent = '달란트는 최대 100까지만 설정할 수 있습니다.'; errEl.classList.add('show'); return; }

      const row = { name, talent_amount: amount, sort_order: sortOrder, target_type: targetType,
        giving_rule: document.getElementById('mGivingRule').value.trim() || null,
        giving_description: document.getElementById('mGivingDesc').value.trim() || null
      };

      if (editingId) {
        const oldItem = allItems.find(i => i.id === editingId);
        const changes = [];
        if (oldItem) {
          if (oldItem.name !== name) changes.push(`항목명: ${oldItem.name} → ${name}`);
          if (oldItem.talent_amount !== amount) changes.push(`달란트: ${oldItem.talent_amount} → ${amount}`);
          if (oldItem.sort_order !== sortOrder) changes.push(`순서: ${oldItem.sort_order} → ${sortOrder}`);
          if (oldItem.target_type !== targetType) changes.push(`대상: ${getCodeLabel('talent_items.target_type', oldItem.target_type, oldItem.target_type)} → ${getCodeLabel('talent_items.target_type', targetType, targetType)}`);
        }
        const { error } = await _sb.from('talent_items').update(row).eq('id', editingId);
        if (error) { await logError('TALENT_ITEM_UPDATE_FAIL', { 항목ID: editingId, 오류: error.message }); errEl.textContent = tErr(error.message); errEl.classList.add('show'); return; }
        await logInfo('TALENT_ITEM_UPDATE', { 항목명: name, 변경내역: changes.join(', ') || '변경 없음' });
      } else {
        row.created_by = session.id;
        const { error } = await _sb.from('talent_items').insert(row);
        if (error) { await logError('TALENT_ITEM_CREATE_FAIL', { 항목명: name, 오류: error.message }); errEl.textContent = tErr(error.message); errEl.classList.add('show'); return; }
        await logInfo('TALENT_ITEM_CREATE', { 항목명: name, 금액: amount });
      }
      closeModal();
      await loadItems();
    }

    async function toggleActive(id, currentActive) {
      const action = currentActive ? '비활성화' : '활성화';
      if (!confirm(`이 항목을 ${action}하시겠습니까?`)) return;
      const item = allItems.find(i => i.id === id);
      await _sb.from('talent_items').update({ is_active: !currentActive }).eq('id', id);
      await logInfo('TALENT_ITEM_TOGGLE', { 항목명: item?.name || id, 활성여부: !currentActive });
      await loadItems();
    }

    async function setQuickButton(id) {
      const item = allItems.find(i => i.id === id);
      if (!item) return;
      const isQuick = item.is_quick_button === true;
      try {
        if (isQuick) {
          const { error } = await _sb.from('talent_items').update({ is_quick_button: false }).eq('id', id);
          if (error) throw error;
        } else {
          const { error: e1 } = await _sb.from('talent_items').update({ is_quick_button: false }).eq('target_type', item.target_type);
          if (e1) throw e1;
          const { error: e2 } = await _sb.from('talent_items').update({ is_quick_button: true }).eq('id', id);
          if (e2) throw e2;
        }
        await logInfo('TALENT_ITEM_QUICKBTN', { 항목명: item.name });
        await loadItems();
      } catch (err) {
        const msg = (err && err.message) || String(err);
        if (/column.*does not exist|schema cache/i.test(msg)) {
          alert('⚡ 퀵 버튼 기능을 사용하려면 DB에 is_quick_button 컬럼을 추가해야 합니다.\n\ndocs/TASK-039_quick_button.sql 파일의 SQL을 실행해주세요.');
        } else {
          alert('퀵 버튼 설정 실패: ' + tErr(msg));
        }
      }
    }

    document.getElementById('itemModal').addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) closeModal(); });
  </script>
  <script src="../js/version.js?v=3.60.0"></script>
</body>
</html>
