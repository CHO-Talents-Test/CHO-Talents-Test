<!DOCTYPE html>
<html lang="ko" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>페이지 권한 관리 - CHO Talents Admin</title>
  <link rel="stylesheet" href="../css/themes.css?v=3.59.0" />
  <link rel="stylesheet" href="../css/admin.css?v=3.59.0" />
  <style>
    .perm-matrix { width:100%; border-collapse:collapse; }
    .perm-matrix th, .perm-matrix td { padding:0.6rem 0.8rem; text-align:center; border:1px solid var(--admin-border); font-size:0.85rem; }
    .perm-matrix th { background:var(--admin-bg); font-weight:700; position:sticky; top:0; }
    .perm-matrix th:first-child, .perm-matrix td:first-child { text-align:left; font-weight:600; min-width:120px; }
    .perm-matrix input[type="checkbox"] { width:18px; height:18px; cursor:pointer; }
    .perm-legend { display:flex; gap:1.5rem; margin-bottom:1rem; font-size:0.85rem; color:var(--admin-text-muted); }
    .perm-legend span { display:inline-flex; align-items:center; gap:0.3rem; }
  </style>
</head>
<body class="admin-body">
  <div id="nav-container"></div>

  <div class="admin-container">
    <h2 style="margin-bottom:0.5rem;">🔐 페이지 권한 관리</h2>
    <p style="color:var(--admin-text-muted);margin-bottom:1rem;">각 페이지별 권한 레벨의 조회/관리 권한을 설정합니다.</p>

    <div class="perm-legend">
      <span>V = 조회(View)</span>
      <span>M = 관리(Manage)</span>
    </div>

    <div class="admin-table-wrap" style="overflow-x:auto;">
      <table class="perm-matrix" id="permMatrix">
        <thead id="matrixHead"></thead>
        <tbody id="matrixBody"><tr><td colspan="15" class="empty-state">로딩 중...</td></tr></tbody>
      </table>
    </div>

    <div style="margin-top:1rem;display:flex;gap:0.5rem;">
      <button class="btn-confirm" onclick="saveAll()">변경사항 저장</button>
      <span id="saveStatus" style="align-self:center;font-size:0.85rem;"></span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/public-config.js?v=3.59.0"></script>
  <script src="../js/supabase-config.js?v=3.59.0"></script>
  <script src="../js/activity-log.js?v=3.59.0"></script>
  <script src="../js/codes.js?v=3.59.0"></script>
  <script src="../js/auth.js?v=3.59.0"></script>
  <script src="../js/theme.js?v=3.59.0"></script>
  <script src="../js/nav.js?v=3.59.0"></script>
  <script>
    initSupabase();
    let session;
    let permData = [];
    const LEVELS = ['admin','evangelist','chief','purchase_teacher','dept_teacher','teacher','student'];
    const LEVEL_LABELS = { admin:'관리자', evangelist:'전도사님', chief:'부장 교사', purchase_teacher:'구매 담당 교사', dept_teacher:'부서 담당 교사', teacher:'일반교사', student:'학생' };
    const PAGES = [
      { key:'dashboard', label:'대시보드' },
      { key:'users', label:'사용자 관리' },
      { key:'departments', label:'부서 관리' },
      { key:'managers', label:'관리자 관리' },
      { key:'talents', label:'달란트 관리' },
      { key:'talent_stats', label:'달란트 통계' },
      { key:'talent_qr', label:'달란트 QR' },
      { key:'talent_items', label:'달란트 항목' },
      { key:'shop', label:'상품 관리' },
      { key:'purchases', label:'구매 관리' },
      { key:'purchase_stats', label:'구매 통계' },
      { key:'reports', label:'보고서' },
      { key:'logs', label:'로그' },
      { key:'audit', label:'작업 이력' },
      { key:'slack_rules', label:'Slack 알림 룰' },
      { key:'versions', label:'버전' },
      { key:'page_permissions', label:'권한 관리' }
    ];

    (async () => {
      await navInit();
      session = await initPage(100, '../login.html');
      if (!session) return;
      navUpdateAuth(session);
      autoLogPageView();
      updatePendingBadge();
      updateNavOrderBadge();
      updateLogBadge();
      loadPermissions();
    })();

    async function loadPermissions() {
      const { data } = await _sb.from('page_permissions').select('*');
      permData = data || [];
      renderMatrix();
    }

    function getPermRow(pageKey, level) {
      return permData.find(r => r.page_key === pageKey && r.permission_level === level);
    }

    function renderMatrix() {
      const head = document.getElementById('matrixHead');
      head.innerHTML = '<tr><th>페이지</th>' +
        LEVELS.map(l => `<th colspan="2">${LEVEL_LABELS[l]}</th>`).join('') + '</tr>' +
        '<tr><th></th>' + LEVELS.map(() => '<th>V</th><th>M</th>').join('') + '</tr>';

      const body = document.getElementById('matrixBody');
      body.innerHTML = PAGES.map(p => {
        const cells = LEVELS.map(l => {
          const row = getPermRow(p.key, l);
          const vChecked = row?.can_view ? 'checked' : '';
          const mChecked = row?.can_manage ? 'checked' : '';
          return `<td><input type="checkbox" data-page="${p.key}" data-level="${l}" data-field="can_view" ${vChecked} /></td>` +
                 `<td><input type="checkbox" data-page="${p.key}" data-level="${l}" data-field="can_manage" ${mChecked} /></td>`;
        }).join('');
        return `<tr><td>${p.label}</td>${cells}</tr>`;
      }).join('');
    }

    async function saveAll() {
      const statusEl = document.getElementById('saveStatus');
      statusEl.textContent = '저장 중...';
      statusEl.style.color = 'var(--admin-primary)';

      const checkboxes = document.querySelectorAll('.perm-matrix input[type="checkbox"]');
      const upserts = [];

      PAGES.forEach(p => {
        LEVELS.forEach(l => {
          const vBox = document.querySelector(`input[data-page="${p.key}"][data-level="${l}"][data-field="can_view"]`);
          const mBox = document.querySelector(`input[data-page="${p.key}"][data-level="${l}"][data-field="can_manage"]`);
          if (!vBox || !mBox) return;

          const canView = vBox.checked;
          const canManage = mBox.checked;
          const existing = getPermRow(p.key, l);

          if (existing) {
            if (existing.can_view !== canView || existing.can_manage !== canManage) {
              upserts.push({ page_key: p.key, permission_level: l, can_view: canView, can_manage: canManage, updated_at: new Date().toISOString() });
            }
          } else if (canView || canManage) {
            upserts.push({ page_key: p.key, permission_level: l, can_view: canView, can_manage: canManage, updated_at: new Date().toISOString() });
          }
        });
      });

      if (upserts.length === 0) {
        statusEl.textContent = '변경사항 없음';
        statusEl.style.color = 'var(--admin-text-muted)';
        return;
      }

      const { error } = await _sb.from('page_permissions').upsert(upserts, { onConflict: 'page_key,permission_level' });
      if (error) {
        statusEl.textContent = '저장 실패: ' + error.message;
        statusEl.style.color = '#e03131';
        return;
      }

      const changesDescription = upserts.map(u => {
        const pageLabel = PAGES.find(p => p.key === u.page_key)?.label || u.page_key;
        const levelLabel = LEVEL_LABELS[u.permission_level] || u.permission_level;
        return `${pageLabel}(${levelLabel}): V=${u.can_view ? 'Y' : 'N'} M=${u.can_manage ? 'Y' : 'N'}`;
      }).join('; ');
      await logInfo('PAGE_PERM_UPDATE', { 페이지: '권한 매트릭스', 변경내역: changesDescription });

      statusEl.textContent = `${upserts.length}건 저장 완료`;
      statusEl.style.color = '#2b8a3e';
      await loadPermissions();
    }
  </script>
  <script src="../js/version.js?v=3.59.0"></script>
</body>
</html>
