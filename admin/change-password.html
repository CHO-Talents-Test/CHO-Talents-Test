<!DOCTYPE html>
<html lang="ko" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 변경 - CHO Talents</title>
  <link rel="stylesheet" href="../css/themes.css?v=3.59.0" />
  <link rel="stylesheet" href="../css/admin.css?v=3.59.0" />
</head>
<body class="admin-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-title">비밀번호 변경</div>
      <p class="login-sub">첫 로그인 시 비밀번호를 변경해주세요</p>

      <div class="form-error" id="errorMsg"></div>
      <div class="form-success" id="successMsg"></div>

      <form id="changePwForm" onsubmit="return false;">
        <div class="form-group">
          <label for="newPassword">새 비밀번호</label>
          <input type="password" id="newPassword" placeholder="8자 이상, 영문+숫자 조합" required />
          <small style="display:block;margin-top:0.3rem;color:#868e96;font-size:0.75rem;">최소 8자, 영문과 숫자를 반드시 포함해야 합니다</small>
        </div>
        <div class="form-group">
          <label for="confirmPassword">비밀번호 확인</label>
          <input type="password" id="confirmPassword" placeholder="새 비밀번호 다시 입력" required />
        </div>
        <button type="submit" class="btn-primary" id="btnChange">비밀번호 변경</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/public-config.js?v=3.59.0"></script>
  <script src="../js/supabase-config.js?v=3.59.0"></script>
  <script src="../js/activity-log.js?v=3.59.0"></script>
  <script src="../js/codes.js?v=3.59.0"></script>
  <script src="../js/auth.js?v=3.59.0"></script>
  <script src="../js/theme.js?v=3.59.0"></script>
  <script src="../js/nav.js?v=3.59.0"></script>
  <script>
    initSupabase();

    function getChangePasswordRedirectTarget() {
      return typeof getRedirectTargetFromQuery === 'function' ? getRedirectTargetFromQuery(null) : null;
    }

    (async () => {
      await navInit();
      const session = await loadAuthSession();
      if (!session) {
        const target = typeof buildLoginRedirectUrl === 'function'
          ? buildLoginRedirectUrl('../login.html', getChangePasswordRedirectTarget() || window.location.href)
          : '../login.html';
        window.location.href = target;
        return;
      }
      navUpdateAuth(session);
      updatePendingBadge();
      updateNavOrderBadge();
      updateLogBadge();

      document.getElementById('changePwForm').addEventListener('submit', async () => {
        const btn = document.getElementById('btnChange');
        const errEl = document.getElementById('errorMsg');
        const sucEl = document.getElementById('successMsg');
        errEl.classList.remove('show');
        sucEl.classList.remove('show');

        const newPw = document.getElementById('newPassword').value;
        const confirmPw = document.getElementById('confirmPassword').value;

        if (newPw === '1234') {
          errEl.textContent = '초기 비밀번호(1234)는 사용할 수 없습니다.';
          errEl.classList.add('show');
          return;
        }
        if (newPw.length < 8) {
          errEl.textContent = '비밀번호는 8자 이상이어야 합니다.';
          errEl.classList.add('show');
          return;
        }
        if (!/[a-zA-Z]/.test(newPw)) {
          errEl.textContent = '비밀번호에 영문을 포함해야 합니다.';
          errEl.classList.add('show');
          return;
        }
        if (!/[0-9]/.test(newPw)) {
          errEl.textContent = '비밀번호에 숫자를 포함해야 합니다.';
          errEl.classList.add('show');
          return;
        }
        if (newPw !== confirmPw) {
          errEl.textContent = '비밀번호가 일치하지 않습니다.';
          errEl.classList.add('show');
          return;
        }

        btn.disabled = true;
        btn.textContent = '변경 중...';

        const result = await changePassword(session.username, newPw);

        if (result.success) {
          await logInfo('PASSWORD_CHANGE', { username: session.username });
          sucEl.textContent = '비밀번호가 변경되었습니다. 잠시 후 이동합니다.';
          sucEl.classList.add('show');
          const redirectUrl = getChangePasswordRedirectTarget() || getRoleRedirectUrl(session.permissionLevel, '../');
          setTimeout(() => { window.location.href = redirectUrl; }, 1500);
        } else {
          await logError('PASSWORD_CHANGE_FAIL', { username: session.username, error: result.error });
          errEl.textContent = tErr(result.error);
          errEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = '비밀번호 변경';
        }
      });
    })();
  </script>
  <script src="../js/version.js?v=3.59.0"></script>
</body>
</html>
