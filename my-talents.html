<!DOCTYPE html>
<html lang="ko" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 달란트 - 달란트 마을</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
  <link rel="stylesheet" href="css/themes.css?v=3.57.0" />
  <link rel="stylesheet" href="css/common.css?v=3.57.0" />
</head>
<body class="page-body">
  <div id="nav-container"></div>


  <div class="page-container" id="mainContent"></div>

  <footer class="page-footer">
    <p>초등부 달란트 관리 &copy; 2026 CHO-Talents</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config/public-config.js?v=3.57.0"></script>
  <script src="js/supabase-config.js?v=3.57.0"></script>
  <script src="js/activity-log.js?v=3.57.0"></script>
  <script src="js/codes.js?v=3.57.0"></script>
  <script src="js/auth.js?v=3.57.0"></script>
  <script src="js/theme.js?v=3.57.0"></script>
  <script src="js/nav.js?v=3.57.0"></script>
  <script src="js/talent.js"></script>
  <script>
    initSupabase();
    let session;
    (async () => {
      await navInit();
      session = await initPage(20, 'login.html');
      if (!session) return;
      navUpdateAuth(session);
      autoLogPageView();
      updateNavOrderBadge();
      loadMyTalents();
    })();

    async function loadMyTalents() {
      const main = document.getElementById('mainContent');
      const summary = await fetchTalentSummary(session.id);
      let pendingTalent = 0;
      try {
        const { data: prof, error: profErr } = await _sb.from('profiles').select('pending_talent').eq('id', session.id).single();
        if (profErr) {
          const msg = profErr.message || '';
          if (!msg.includes('does not exist')) logWarn('MY_TALENT_PENDING_QUERY', { error: msg });
        } else {
          pendingTalent = (prof && prof.pending_talent) || 0;
        }
      } catch (e) { /* pending_talent column may not exist */ }
      const available = summary.balance - pendingTalent;
      const { data: history } = await fetchTalentHistory(session.id, { limit: 50 });

      let deliveryCount = 0;
      try {
        const { data: delOrders } = await _sb.from('product_orders')
          .select('id').eq('user_id', session.id).in('status', ['requested', 'preparing', 'purchased']);
        deliveryCount = (delOrders || []).length;
      } catch (e) {}

      let html = `
        <h1 class="page-title">💰 내 달란트</h1>
        <p class="page-sub">${session.displayName || session.username}님의 달란트 현황</p>
        <div class="summary-cards">
          <div class="summary-card balance">
            <div class="summary-card-icon">⭐</div>
            <div class="summary-card-label">사용 가능 달란트</div>
            <div class="summary-card-value">${fmtNum(available)}</div>
          </div>
          <div class="summary-card" style="background:#e7f5ff;">
            <div class="summary-card-icon">🎁</div>
            <div class="summary-card-label">수령 대기 상품수</div>
            <div class="summary-card-value" style="color:#1971c2;">${fmtNum(deliveryCount)}건</div>
          </div>
          <div class="summary-card" style="background:#fff3bf;">
            <div class="summary-card-icon">⏳</div>
            <div class="summary-card-label">사용 대기 달란트</div>
            <div class="summary-card-value" style="color:#e67700;">${fmtNum(pendingTalent)}</div>
          </div>
          <div class="summary-card use">
            <div class="summary-card-icon">📉</div>
            <div class="summary-card-label">사용 완료 달란트</div>
            <div class="summary-card-value">${fmtNum(summary.used)}</div>
          </div>
          <div class="summary-card" style="background:#fff0f6;">
            <div class="summary-card-icon">↩️</div>
            <div class="summary-card-label">반환 달란트</div>
            <div class="summary-card-value" style="color:#c2255c;">${fmtNum(summary.returned)}</div>
          </div>
          <div class="summary-card earn">
            <div class="summary-card-icon">📈</div>
            <div class="summary-card-label">누적 적립 달란트</div>
            <div class="summary-card-value">${fmtNum(summary.earned)}</div>
          </div>
        </div>
        <div id="earnBreakdown" style="margin-bottom:1.5rem;"></div>
        <div class="data-table-wrap">
          <div class="data-table-header"><div class="data-table-title">달란트 내역</div></div>
          <table class="data-table">
            <thead><tr><th>날짜</th><th>유형</th><th>금액</th><th>설명</th><th>잔액</th></tr></thead>
            <tbody>`;

      if (!history || history.length === 0) {
        html += '<tr><td colspan="5" class="empty-state">아직 달란트 내역이 없습니다.</td></tr>';
      } else {
        html += history.map(t => {
          const isReturn = t.type === 'use' && t.description && t.description.startsWith('반환:');
          const srcBadge = t.type === 'earn' && t.source === 'qr' ? ' <span style="font-size:0.65rem;padding:0.1rem 0.3rem;border-radius:3px;background:#d0ebff;color:#1971c2;">QR</span>' : '';
          let typeLabel, typeClass, amtColor, amtPrefix;
          if (isReturn) {
            typeLabel = '반환'; typeClass = 'return'; amtColor = '#c2255c'; amtPrefix = '-';
          } else if (t.type === 'earn') {
            typeLabel = '적립'; typeClass = 'earn'; amtColor = '#2b8a3e'; amtPrefix = '+';
          } else {
            typeLabel = '사용'; typeClass = 'use'; amtColor = '#e03131'; amtPrefix = '-';
          }
          const desc = (t.description || '-').replace(/\[[0-9a-f-]{36}\]\s*/gi, '').replace(/^반환:\s*/, '');
          return `<tr>
            <td>${formatKSTShort(t.created_at)}</td>
            <td><span class="type-badge ${typeClass}" ${isReturn ? 'style="background:#fff0f6;color:#c2255c;"' : ''}>${typeLabel}</span>${srcBadge}</td>
            <td style="font-weight:700;color:${amtColor}">${amtPrefix}${fmtNum(t.amount)}</td>
            <td>${desc}</td>
            <td>${fmtNum(t.balance_after)}</td>
          </tr>`;
        }).join('');
      }

      html += '</tbody></table></div>';

      let orders = null;
      try {
        const { data: od, error: odErr } = await _sb.from('product_orders').select('*').eq('user_id', session.id).neq('status', 'cancelled').order('created_at', { ascending: false }).limit(20);
        if (odErr) { logWarn('MY_TALENT_ORDERS_QUERY', { error: odErr.message }); }
        else { orders = od; }
      } catch (e) {}
      if (orders && orders.length > 0) {
        const statusMap = { requested:'구매 신청', preparing:'상품 준비', purchased:'상품 구매', delivered:'상품 지급' };
        const statusColor = { requested:'#868e96', preparing:'#e67700', purchased:'#1971c2', delivered:'#2b8a3e' };
        html += `<div class="data-table-wrap" style="margin-top:1.5rem;">
          <div class="data-table-header"><div class="data-table-title">🛒 구매 내역</div></div>
          <table class="data-table">
            <thead><tr><th>날짜</th><th>상품명</th><th>가격</th><th>상태</th></tr></thead>
            <tbody>` + orders.map(o => `<tr>
              <td>${formatKSTShort(o.requested_at || o.created_at)}</td>
              <td>${o.product_name}</td>
              <td>${fmtNum(o.price)} 달란트</td>
              <td><span style="padding:0.15rem 0.5rem;border-radius:4px;font-size:0.8rem;background:${statusColor[o.status]||'#868e96'}22;color:${statusColor[o.status]||'#868e96'};font-weight:600;">${statusMap[o.status]||o.status}</span></td>
            </tr>`).join('') + '</tbody></table></div>';
      }

      main.innerHTML = html;
      showEarnBreakdown();
    }

    async function showEarnBreakdown() {
      const el = document.getElementById('earnBreakdown');
      if (!el) return;
      el.innerHTML = '<div style="text-align:center;color:#868e96;">불러오는 중...</div>';
      const { data: txns } = await _sb.from('talent_transactions')
        .select('amount, description, talent_item_id')
        .eq('user_id', session.id).eq('type', 'earn');
      if (!txns || txns.length === 0) { el.innerHTML = '<div style="text-align:center;color:#868e96;">적립 내역이 없습니다.</div>'; return; }
      const total = txns.reduce((s, t) => s + (t.amount || 0), 0);
      const byDesc = {};
      txns.forEach(t => {
        const key = t.description || '기타';
        if (!byDesc[key]) byDesc[key] = { count: 0, amount: 0 };
        byDesc[key].count++;
        byDesc[key].amount += t.amount || 0;
      });
      const sorted = Object.entries(byDesc).sort((a, b) => b[1].amount - a[1].amount);
      el.innerHTML = `<div style="background:#fff;border:1px solid var(--c-border);border-radius:12px;padding:1rem;">
        <div style="font-weight:700;font-size:0.9rem;margin-bottom:0.6rem;">📊 항목별 적립 현황</div>
        <div style="font-size:0.82rem;">` + sorted.map(([name, v]) => {
          const pct = total > 0 ? ((v.amount / total) * 100).toFixed(1) : 0;
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;border-bottom:1px solid #f1f3f5;">
            <span>${name}</span>
            <span style="font-weight:600;">${fmtNum(v.amount)} 달란트 × ${v.count}회 <span style="color:#868e96;">(${pct}%)</span></span>
          </div>`;
        }).join('') + `</div></div>`;
    }
  </script>
  <script src="js/version.js?v=3.57.0"></script>
</body>
</html>
